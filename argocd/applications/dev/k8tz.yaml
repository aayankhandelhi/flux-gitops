apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: k8tz-dev
  namespace: argocd

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: k8tz

  source:
    repoURL: https://k8tz.github.io/k8tz/
    chart: k8tz
    targetRevision: 0.9.0

    helm:
      valueFiles:
      - $values/helm-values/dev/k8tz-values.yaml

    repoURL: https://github.com/aayankhandelhi/flux-gitops.git
    targetRevision: main
    ref: values

  syncPolicy:
    automated:
      prune: true
      selfHeal: true